<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — GoPhish Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        /* Animated background */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(236,72,153,0.05) 0%, transparent 50%);
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .login-container {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px; padding: 1.5rem;
        }
        .login-card {
            background: rgba(15,20,35,0.85);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .login-logo {
            display: flex; align-items: center; gap: 0.6rem;
            margin-bottom: 2rem;
        }
        .login-logo svg { color: #3b82f6; }
        .login-logo span {
            font-size: 1.1rem; font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .login-title {
            font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem;
        }
        .login-subtitle {
            font-size: 0.85rem; color: #64748b; margin-bottom: 2rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-label {
            display: block; font-size: 0.8rem; font-weight: 600;
            color: #94a3b8; margin-bottom: 0.4rem;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .form-input {
            width: 100%; padding: 0.7rem 0.9rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; color: #e2e8f0;
            font-size: 0.9rem; font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }
        .form-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .form-input::placeholder { color: #475569; }

        .btn-login {
            width: 100%; padding: 0.75rem;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border: none; border-radius: 10px;
            color: white; font-size: 0.9rem; font-weight: 600;
            font-family: inherit; cursor: pointer;
            transition: all 0.2s; margin-top: 0.5rem;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(59,130,246,0.3);
        }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
        }

        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #f87171; padding: 0.6rem 0.9rem;
            border-radius: 8px; font-size: 0.8rem;
            margin-bottom: 1rem; display: none;
        }
        .error-msg.visible { display: block; animation: shake 0.4s ease; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                <span>GoPhish Analyzer</span>
            </div>
            <h1 class="login-title">Welcome back</h1>
            <p class="login-subtitle">Sign in to access the campaign dashboard</p>

            <div class="error-msg" id="error-msg">Invalid username or password</div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter username" required autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btn-login">Sign In</button>
            </form>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errEl = document.getElementById('error-msg');
            btn.disabled = true; btn.textContent = 'Signing in...';
            errEl.classList.remove('visible');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errEl.textContent = data.error || 'Invalid credentials';
                    errEl.classList.add('visible');
                }
            } catch (err) {
                errEl.textContent = 'Connection error. Please try again.';
                errEl.classList.add('visible');
            }
            btn.disabled = false; btn.textContent = 'Sign In';
        }
    </script>
</body>
</html>
